name: github-pages

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [cv-updated]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout CV repo (for publications.bib)
        uses: actions/checkout@v6
        with:
          repository: dedeswim/cv
          path: cv

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build site
        run: uv run build.py

      - name: Add CNAME
        run: echo 'edoardo.science' > _site/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
