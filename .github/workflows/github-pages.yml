name: github-pages

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [cv-updated]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout CV repo (for publications.bib)
        uses: actions/checkout@v4
        with:
          repository: dedeswim/cv
          path: cv

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv run build.py

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: edoardo.science
